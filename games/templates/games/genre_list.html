{% extends 'base.html' %}

{% block content %}
<h1>Genres</h1>

{% if genres %}
<ul class="genre-list">
    {% for genre in genres %}
    <li>
        <a href="{% url 'genre-detail' genre.id %}">{{ genre.name }}</a>
    </li>
    {% endfor %}
</ul>
{% else %}
<p>You don't have any games in any genres yet.</p>
{% endif %}
{% endblock %}
