{% extends 'base.html' %}

{% block content %}
<h1>{{ genre.name }}</h1>

{% if games %}
<ul class="game-list">
    {% for game in games %}
    <li>
        <a href="{% url 'game-detail' game.id %}">
            {{ game.title }}
        </a>
    </li>
    {% endfor %}
</ul>
{% else %}
<p>You don't have any games in this genre yet.</p>
{% endif %}
{% endblock %}
