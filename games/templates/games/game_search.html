{% extends 'base.html' %}
{% block content %}

<h1>Search Games</h1>

<!-- Search Form -->
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Search</button>
</form>

{% if games %}
<h2>Results</h2>

<form method="POST" action="{% url 'game-import' %}">
    {% csrf_token %}

    {% for game in games %}
    <div class="game-result"
        style="border:1px solid #ccc; padding:10px; margin:10px 0; display:flex; align-items:center;">
        {% if game.image %}
        <img src="{{ game.image }}" alt="{{ game.name }}" width="120" style="margin-right:15px;">
        {% endif %}

        <div class="game-info">
            <p><strong>{{ game.name }}</strong></p>

            <label for="platform_{{ game.id }}">Select Platform:</label>
            <select name="console_name" id="platform_{{ game.id }}">
                {% for platform in game.platforms %}
                <option value="{{ platform }}">{{ platform }}</option>
                {% endfor %}
            </select>

            <div>
                <input type="checkbox" name="game_ids" value="{{ game.id }}">
                Import this game
            </div>
        </div>
    </div>
    {% endfor %}

    <button type="submit">Import Selected Games</button>
</form>
{% endif %}

{% endblock %}
